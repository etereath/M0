name: Release package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.11"
      - name: Install fixed Python dependencies
        run: python -m pip install .
      - name: Validate contracts
        run: make validate
      - name: Run tests
        run: make test
      - name: Build release package
        run: make package
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" dist/automation-platform-contracts-v*.zip \
            --title "M0 Public Contracts $GITHUB_REF_NAME" \
            --notes "M0 public-contract baseline: OpenAPI, JSON Schema, governance documents, fixtures, and reference types. The release is validated before packaging."
