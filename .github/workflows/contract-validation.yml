name: Contract validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.11"
      - name: Install fixed Python dependencies
        run: python -m pip install .
      - name: Validate contracts
        run: make validate
      - name: Run tests
        run: make test
      - name: Package release artifact
        run: make package
      - name: Publish validation summary
        shell: bash
        run: |
          echo "## Contract validation" >> "$GITHUB_STEP_SUMMARY"
          cat dist/VALIDATION_REPORT.txt >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contract-validation-artifact
          path: |
            dist/automation-platform-contracts-v*.zip
            dist/SHA256SUMS.txt
            dist/VALIDATION_REPORT.txt
          if-no-files-found: error
